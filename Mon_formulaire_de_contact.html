<body>

<header>
    <nav class="container">
        <a href="./index.html">Présentation</a>

        <a href="./Mon_formulaire_de_recherche_de_projet.html">Recherche</a>
    </nav>
</header>

<main>
    <section class="contact-box">
        <form action="mailto:aysediop@icloud.com" method="post" enctype="text/plain">
            <fieldset>
                <legend>Formulaire de contact</legend>

                <label for="nom">Nom complet</label>
                <input type="text" id="nom" name="nom" required autofocus>

                <label for="email">Adresse email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Votre message</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit">Envoyer</button>
            </fieldset>
        </form>
    </section>

    <article class="contact-info">
        <h1>Contact professionnel</h1>
        <p>📞 77 144 83 77</p>
        <p>📧 aysediop@icloud.com</p>
    </article>
</main>

</body>
</html>
