
 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact</title>
    <link rel="stylesheet" href="./style3.css">
</head>
<body>

<header>
    <nav class="container">
        <a href="./index.html">Présentation</a>
        <a href="./Mes_competences_et_mes_experiences.html">Compétences</a>
        <a href="./Mon_formulaire_de_contact.html">Contact</a>
        <a href="./Mon_formulaire_de_projet.html">Projet</a>
        <a href="./Mon_formulaire_de_recherche_de_projet.html">Recherche</a>
    </nav>
</header>

<main>
 <section class="project-form">
    <form action="mailto:aysediop@icloud.com" method="post" enctype="text/plain">
        <fieldset>
            <legend>Demande de projet</legend>

            <label for="nom">Nom complet du projet</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Adresse e-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="entreprise">Entreprise / organisation</label>
            <input type="text" id="entreprise" name="entreprise">

            <label for="typeProjet">Type de projet</label>
            <input type="text" id="typeProjet" name="typeProjet"
                   placeholder="Site web, application, portfolio...">

            <label for="budget">Budget estimé</label>
            <input type="text" id="budget" name="budget"
                   placeholder="Ex : 150 000 FCFA">

            <label for="description">Description du projet</label>
            <textarea id="description" name="description" rows="6"
                placeholder="Décrivez les fonctionnalités souhaitées"></textarea>

            <label for="delai">Délai souhaité</label>
            <input type="date" id="delai" name="delai">

            <button type="submit">Envoyer la demande</button>
        </fieldset>
    </form>
</section>
</main>
    
</body>
